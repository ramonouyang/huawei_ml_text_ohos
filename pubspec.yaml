name: huawei_ml_text_ohos
description: HarmonyOS Core Vision Kit text recognition plugin for Flutter. Wraps @kit.CoreVisionKit textRecognition API via MethodChannel.
version: 1.1.0
homepage: https://github.com/ramonouyang/huawei_ml_text_ohos

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      ohos:
        dartPluginClass: HuaweiMlTextOhos
        pluginClass: HuaweiMlTextPlugin
